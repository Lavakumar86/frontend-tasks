<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Student Task Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body.login-bg {
      background-color: #f8f5ec;
      height: 100vh;
    }
    .task-card:hover {
      transform: scale(1.02);
      transition: 0.2s ease;
    }
  </style>
</head>
<body>





<nav class="navbar navbar-dark bg-dark px-4 d-none" id="navbar"> <!-- navigation -->
  <span class="navbar-brand fw-bold">Student Task Manager</span>
  <button class="btn btn-outline-light" id="logoutBtn">Logout</button>
</nav>






<div id="authSection" class="login-bg d-flex justify-content-center align-items-center">
  <div class="card shadow p-4" style="width:380px">

    




    <div id="loginBox">
      <h4 class="text-center mb-3">Login</h4>
      <form id="loginForm">
        <input type="text" id="loginUsername" class="form-control mb-3" placeholder="Username" required>
        <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Password" required>
        <button class="btn btn-dark w-100 mb-2">Login</button>
      </form>
      <p class="text-center">No account? <a href="#" id="showSignup">Signup</a></p>
    </div>

    




    <div id="signupBox" class="d-none">
      <h4 class="text-center mb-3">Signup</h4>
      <form id="signupForm">
        <input type="text" id="signupUsername" class="form-control mb-3" placeholder="Username" required>
        <input type="password" id="signupPassword" class="form-control mb-3" placeholder="Password" required>
        <button class="btn btn-success w-100 mb-2">Create Account</button>
      </form>
      <p class="text-center">Already have account? <a href="#" id="showLogin">Login</a></p>
    </div>

  </div>
</div>






<div class="container mt-4 d-none" id="dashboard">

  
  <div class="row mb-4" id="statsSection"></div>


  <div class="row mb-3">
    <div class="col-md-4">
      <input type="text" id="searchInput" class="form-control" placeholder="Search tasks...">
    </div>
    <div class="col-md-3">
      <select id="statusFilter" class="form-select">
        <option value="All">Filter by Status</option>
        <option value="Pending">Pending</option>
        <option value="In Progress">In Progress</option>
        <option value="Completed">Completed</option>
      </select>
    </div>
    <div class="col-md-3">
      <select id="categoryFilter" class="form-select">
        <option value="All">Filter by Category</option>
      </select>
    </div>
    <div class="col-md-2">
      <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#taskModal">
        Add Task
      </button>
    </div>
  </div>



  <!-- Task Cards -->
  <div class="row" id="taskContainer"></div>
</div>







<div class="modal fade" id="taskModal">  <!-- TASK MODAL -->
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-dark text-white">
        <h5>Add Task</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="taskForm">
          <input type="text" id="taskName" class="form-control mb-2" placeholder="Task Name" required>
          <textarea id="taskDescription" class="form-control mb-2" placeholder="Description" required></textarea>
          <input type="text" id="taskCategory" class="form-control mb-2" placeholder="Category" required>

          <select id="taskPriority" class="form-select mb-2">
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
          </select>

          <select id="taskStatus" class="form-select mb-2">
            <option>Pending</option>
            <option>In Progress</option>
            <option>Completed</option>
          </select>

          <input type="date" id="taskDueDate" class="form-control mb-3" required>
          <button class="btn btn-success w-100">Save Task</button>
        </form>
      </div>
    </div>
  </div>
</div>







<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
